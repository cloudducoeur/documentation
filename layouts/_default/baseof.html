<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
  {{- partial "head.html" . -}}
  <body dir="{{ .Site.Language.LanguageDirection | default `ltr` }}">
    <!-- Pre-loader -->
    <div id="preloader">
      <div class="preloader-inner">
        <img src="{{ "img/logo.png" | relURL }}" alt="Chargement..." class="preloader-logo" />
        <div class="preloader-spinner"></div>
      </div>
    </div>
    <script>
      (function() {
        window.addEventListener('load', function() {
          var preloader = document.getElementById('preloader');
          preloader.classList.add('preloader-hidden');
          preloader.addEventListener('transitionend', function() {
            preloader.style.display = 'none';
          });
        });
      })();
    </script>
    <!-- Fin Pre-loader -->

    {{- partial "navbar.html" . -}}
    {{- block "main" . }}{{ end -}}
    {{- if or (eq .Site.Params.footer.enable nil) (.Site.Params.footer.enable) }}
      {{ partial "footer.html" . }}
    {{ end }}
    {{ partial "scripts.html" . }}
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

      mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose'
      });

      function renderMermaidDiagrams() {
        document.querySelectorAll('pre code.language-mermaid').forEach(function(codeBlock, index) {
          var pre = codeBlock.parentElement;

          if (!pre || pre.dataset.mermaidProcessed === 'true') {
            return;
          }

          var container = document.createElement('div');
          container.className = 'mermaid';
          container.id = 'mermaid-diagram-' + index;
          container.textContent = codeBlock.textContent;
          pre.dataset.mermaidProcessed = 'true';
          pre.replaceWith(container);
        });

        mermaid.run({
          querySelector: '.mermaid'
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderMermaidDiagrams);
      } else {
        renderMermaidDiagrams();
      }
    </script>
    {{- partial "chatbot.html" . -}}
  </body>
</html>
